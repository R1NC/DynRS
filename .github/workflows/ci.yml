name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  rust:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Detect libclang path
        shell: pwsh
        run: |
          $libclang = (where.exe libclang.dll | Select-Object -First 1).Trim()
          if (-not $libclang) {
            throw "libclang.dll not found on PATH"
          }
          $dir = Split-Path -Parent $libclang
          "LIBCLANG_PATH=$dir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "LIBCLANG_PATH=$dir"

      - name: Build
        run: cargo build --verbose

      - name: Test
        run: cargo test --verbose
